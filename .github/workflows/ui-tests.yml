name: UI Automation Dispatch

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "测试模式"
        required: true
        default: "contracts"
        type: choice
        options:
          - contracts
          - smoke
          - all
      target_repository:
        description: "UI 自动化测试仓库"
        required: true
        default: "Inventionyin/UItest"
      target_ref:
        description: "测试仓库分支或标签"
        required: true
        default: "main"
      app_repository:
        description: "被测电商平台仓库"
        required: true
        default: "dengzhekun/projectku-web"
      app_ref:
        description: "被测电商平台分支或标签"
        required: true
        default: "main"
      base_url:
        description: "被测电商平台地址"
        required: true
        default: "http://127.0.0.1:5173"
      mailbox_action:
        description: "可选业务邮箱动作：account / shop / support"
        required: false
        default: ""

jobs:
  ui-tests:
    name: Run UI Automation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout UI automation repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.target_ref }}
          path: ui-tests

      - name: Checkout e-commerce application
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.app_repository }}
          ref: ${{ inputs.app_ref }}
          path: app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui-tests/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui-tests

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ui-tests

      - name: Install app frontend dependencies
        run: npm ci
        working-directory: app/frontend

      - name: Write dispatch context
        shell: bash
        run: |
          {
            echo "## UI Automation Dispatch"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Run mode | \`${{ inputs.run_mode }}\` |"
            echo "| Mailbox action | \`${{ inputs.mailbox_action }}\` |"
            echo "| Test repo | \`${{ inputs.target_repository }}@${{ inputs.target_ref }}\` |"
            echo "| Test SHA | \`$(git -C ui-tests rev-parse --short HEAD)\` |"
            echo "| App repo | \`${{ inputs.app_repository }}@${{ inputs.app_ref }}\` |"
            echo "| App SHA | \`$(git -C app rev-parse --short HEAD)\` |"
            echo "| Base URL | \`${{ inputs.base_url }}\` |"
            echo "| Node | \`$(node --version)\` |"
            echo "| npm | \`$(npm --version)\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Start app frontend
        shell: bash
        working-directory: app/frontend
        run: |
          set -euo pipefail
          nohup npm run dev -- --host 127.0.0.1 > /tmp/projectku-frontend.log 2>&1 &
          for attempt in {1..60}; do
            if curl -fsS "${{ inputs.base_url }}" >/dev/null; then
              echo "Frontend is ready at ${{ inputs.base_url }}"
              exit 0
            fi
            sleep 2
          done
          cat /tmp/projectku-frontend.log
          exit 1

      - name: Typecheck UI automation project
        run: npm run typecheck
        working-directory: ui-tests

      - name: List Playwright tests
        id: list-tests
        shell: bash
        run: npx playwright test --list
        working-directory: ui-tests
        env:
          BASE_URL: ${{ inputs.base_url }}
          HEADLESS: "true"
          MAILBOX_ACTION: ${{ inputs.mailbox_action }}

      - name: Run selected UI tests
        shell: bash
        working-directory: ui-tests
        env:
          BASE_URL: ${{ inputs.base_url }}
          HEADLESS: "true"
          MAILBOX_ACTION: ${{ inputs.mailbox_action }}
        run: |
          set -euo pipefail
          case "${{ inputs.run_mode }}" in
            contracts)
              npm run test:allure -- tests/contracts
              ;;
            smoke)
              npm run test:allure -- tests/smoke
              ;;
            all)
              npm run test:allure
              ;;
            *)
              echo "Unsupported run_mode: ${{ inputs.run_mode }}"
              exit 1
              ;;
          esac

      - name: Collect diagnostic files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          cp /tmp/projectku-frontend.log diagnostics/projectku-frontend.log 2>/dev/null || true
          {
            echo "## Diagnostic Inventory"
            echo ""
            echo "### Frontend log"
            if [ -s diagnostics/projectku-frontend.log ]; then
              echo "Captured \`projectku-frontend.log\`."
            else
              echo "No frontend log was captured."
            fi
            echo ""
            echo "### Report directories"
            for dir in ui-tests/playwright-report ui-tests/allure-results ui-tests/allure-report ui-tests/output/reports; do
              if [ -d "$dir" ]; then
                echo "- \`$dir\`: $(find "$dir" -type f | wc -l | tr -d ' ') files"
              else
                echo "- \`$dir\`: missing"
              fi
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ui-tests/playwright-report/
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ui-tests/allure-results/
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ui-tests/allure-report/
          if-no-files-found: ignore

      - name: Upload summary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-report
          path: ui-tests/output/reports/
          if-no-files-found: ignore

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: diagnostics/
          if-no-files-found: ignore
